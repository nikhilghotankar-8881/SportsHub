<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject }}</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333333;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f7f6; padding: 20px 0;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin: 0 auto; border-collapse: collapse;">
                    <!-- Header -->
                    <tr>
                        <td style="background: linear-gradient(135deg, #0d6efd, #0b5ed7); padding: 30px; text-align: center;">
                            <h1 style="color: #ffffff; margin: 0; font-size: 28px; font-weight: 700; letter-spacing: 1px;">SportsHub</h1>
                            {% if header_text %}
                            <p style="color: #e9ecef; margin: 10px 0 0 0; font-size: 16px;">{{ header_text }}</p>
                            {% endif %}
                        </td>
                    </tr>
                    
                    <!-- Content Area -->
                    <tr>
                        <td style="padding: 40px 30px; line-height: 1.6;">
                            {% block content %}{% endblock %}
                        </td>
                    </tr>
                    
                    <!-- Footer -->
                    <tr>
                        <td style="background-color: #f8f9fa; padding: 30px; text-align: center; border-top: 1px solid #eeeeee;">
                            <p style="margin: 0 0 10px 0; color: #6c757d; font-size: 14px;">
                                <strong>SportsHub</strong><br>
                                Chhatrapati Sambhajinagar, Maharashtra, India<br>
                                Phone: +91 9876543210
                            </p>
                            <p style="margin: 0; font-size: 14px;">
                                <a href="mailto:nikhilghotankar@gmail.com" style="color: #0d6efd; text-decoration: none;">Support</a> | 
                                <a href="https://github.com/nikhilghotankar-8881/SportsHub" style="color: #0d6efd; text-decoration: none;">Website</a>
                            </p>
                            <p style="margin: 15px 0 0 0; font-size: 12px; color: #adb5bd;">
                                &copy; {{ current_year|default('2026') }} SportsHub. All rights reserved.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
