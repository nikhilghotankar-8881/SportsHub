<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

<h2>User Registration</h2>

<form method="POST">

    {{ form.hidden_tag() }}

    <p>
        {{ form.name.label }}
        {{ form.name() }}
    </p>

    <p>
        {{ form.email.label }}
        {{ form.email() }}
    </p>

    <p>
        {{ form.password.label }}
        {{ form.password() }}
    </p>

    <p>
        {{ form.submit() }}
    </p>

</form>

</body>
</html>
